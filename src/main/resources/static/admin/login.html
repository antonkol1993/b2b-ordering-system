<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Login</title>
</head>
<body>
<h2>Admin Login</h2>

<form id="loginForm">
  <div>
    <label>Email</label>
    <input id="email" type="email" required value="admin@nike.com"/>
  </div>
  <div>
    <label>Password</label>
    <input id="password" type="password" required value="123"/>
  </div>
  <button type="submit">Login</button>
</form>

<pre id="out" style="white-space: pre-wrap;"></pre>

<script>
  const form = document.getElementById('loginForm');
  const out = document.getElementById('out');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    out.textContent = 'Logging in...';

    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });

    if (!res.ok) {
      out.textContent = 'Login failed: ' + (await res.text());
      return;
    }

    const json = await res.json();
    out.textContent = 'OK. Tenant: ' + json.tenantSlug + '. Redirecting...';
    window.location.href = '/admin/products.html';
  });
</script>
</body>
</html>
