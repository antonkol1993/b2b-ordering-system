version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: b2b-postgres
    environment:
      POSTGRES_DB: b2b
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"   # доступ из Codespace
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: